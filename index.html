<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExtraBeen | Nokia 1100 Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --nokia-bg: #99b19c; /* سبز معروف نوکیا */
            --nokia-dark: #1f271b; /* سیاه ال‌سی‌دی */
            --pixel-size: 2px;
        }

        body {
            font-family: 'VT323', 'Vazirmatn', monospace; /* اولویت با فونت پیکسلی انگلیسی، فال‌بک فارسی */
            background-color: #e5e7eb;
            color: var(--nokia-dark);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 20px 20px;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .phone-body {
            background-color: #1a2e42;
            border-radius: 30px 30px 40px 40px;
            box-shadow: 
                inset 0 4px 8px rgba(255,255,255,0.2),
                inset 0 -8px 12px rgba(0,0,0,0.5),
                0 20px 40px rgba(0,0,0,0.4);
            padding: 20px;
            width: 340px;
            position: relative;
            border: 4px solid #142433;
        }

        .nokia-screen {
            background-color: var(--nokia-bg);
            border: 4px solid #000;
            border-radius: 8px;
            padding: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            height: 380px;
            display: flex;
            flex-direction: column;
        }

        .pixel-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(transparent 50%, rgba(0,0,0,0.05) 50%),
                linear-gradient(90deg, rgba(0,0,0,0.05) 50%, transparent 50%);
            background-size: 3px 3px;
            pointer-events: none;
            z-index: 20; /* Increased Z-index to cover canvas */
        }

        .menu-item {
            border: 2px solid transparent;
            padding: 6px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: none;
        }
        
        .menu-item:active, .menu-item:hover, .menu-item.selected {
            background-color: var(--nokia-dark);
            color: var(--nokia-bg);
        }
        .menu-item:active svg, .menu-item:hover svg, .menu-item.selected svg {
            color: var(--nokia-bg);
        }
        .menu-item:active .menu-border, .menu-item:hover .menu-border, .menu-item.selected .menu-border {
            border-color: var(--nokia-bg);
        }
        .menu-item.selected .menu-border div, .menu-item:hover .menu-border div {
             border-left-color: var(--nokia-bg);
        }
        .menu-item.selected .menu-border div.border, .menu-item:hover .menu-border div.border {
             border-color: var(--nokia-bg);
        }

        .promo-item {
            background-color: var(--nokia-dark);
            color: var(--nokia-bg);
            animation: blink-invert 2s step-end infinite;
        }
        .promo-item.selected {
            background-color: var(--nokia-dark);
            color: var(--nokia-bg);
            border: 2px solid var(--nokia-dark);
        }

        .promo-item svg {
            color: var(--nokia-bg);
        }
        
        @keyframes blink-invert {
            0%, 50% { 
                background-color: var(--nokia-dark); 
                color: var(--nokia-bg); 
            }
            51%, 100% { 
                background-color: transparent; 
                border: 2px solid var(--nokia-dark);
                color: var(--nokia-dark); 
            }
        }
        
        .pixel-img {
            image-rendering: pixelated;
            filter: grayscale(100%) contrast(150%);
            border: 2px solid var(--nokia-dark);
        }

        .pixel-font-fa {
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .nokia-scrollbar {
            width: 6px;
            background: rgba(31, 39, 27, 0.1);
            position: absolute;
            right: 2px;
            top: 25px;
            bottom: 25px;
            border-radius: 2px;
        }
        .nokia-scroll-thumb {
            width: 100%;
            height: 30%;
            background: var(--nokia-dark);
            border-radius: 2px;
            transition: top 0.2s steps(5);
            position: relative;
            top: 0;
        }

        .phy-btn {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .phy-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        /* Game specific styles */
        #game-screen {
            display: none;
            position: absolute;
            top: 30px; /* Below status bar */
            left: 0;
            width: 100%;
            bottom: 30px; /* Above soft keys */
            background-color: var(--nokia-bg);
            z-index: 15;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            image-rendering: pixelated;
            border: 2px solid var(--nokia-dark);
            background-color: #8fa592; /* Slightly darker than bg for contrast */
        }
        
        .game-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--nokia-dark);
            color: var(--nokia-bg);
            padding: 5px 10px;
            font-family: 'VT323', monospace;
            font-size: 24px;
            display: none;
            border: 2px solid var(--nokia-bg);
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="phone-body">
        <div class="text-center text-gray-400 font-bold text-xs tracking-widest mb-2 opacity-50 uppercase">Nokia</div>
        
        <div class="nokia-screen">
            <div class="pixel-overlay"></div>
            
            <!-- نوار وضعیت بالا -->
            <div class="flex justify-between items-end border-b-2 border-[#1f271b] pb-1 mb-2 px-1 relative z-30">
                <div class="flex items-end gap-1">
                    <div class="flex flex-col gap-[1px]">
                        <div class="flex items-end gap-[1px] h-3">
                            <div class="w-1 h-1 bg-[#1f271b]"></div>
                            <div class="w-1 h-2 bg-[#1f271b]"></div>
                            <div class="w-1 h-3 bg-[#1f271b]"></div>
                            <div class="w-1 h-full bg-[#1f271b]"></div>
                        </div>
                    </div>
                    <span id="network-name" class="text-[10px] font-bold leading-none mb-[1px] uppercase tracking-tighter">Irancell 2G</span>
                </div>
                <div class="font-mono text-lg font-bold leading-none translate-y-[2px]" id="clock">12:00</div>
                <div class="flex flex-col items-end gap-[1px]">
                    <div class="w-5 h-3 border-2 border-[#1f271b] p-[1px] flex gap-[1px]">
                        <div class="w-1 h-full bg-[#1f271b]"></div>
                        <div class="w-1 h-full bg-[#1f271b]"></div>
                        <div class="w-1 h-full bg-[#1f271b]"></div>
                    </div>
                </div>
            </div>

            <!-- محتوای اصلی منو -->
            <div id="menu-container" class="flex flex-col flex-grow overflow-y-auto px-1 relative no-scrollbar" style="scrollbar-width: none;">
                
                <!-- هدر پروفایل -->
                <div class="flex items-center gap-3 mb-4 border-b-2 border-[#1f271b] border-dashed pb-3 mt-1">
                    <img src="2.jpg" alt="Profile" class="w-12 h-12 pixel-img" onerror="this.src='https://ui-avatars.com/api/?name=EB&background=000&color=fff'">
                    <div class="flex flex-col">
                        <span class="text-xl font-bold uppercase leading-none">ExtraBeen</span>
                        <span class="text-xs font-bold mt-1">Menu 1-1</span>
                    </div>
                </div>

                <!-- لیست منو -->
                <div class="flex flex-col gap-1 pb-4" id="menu-list">
                    
                    <!-- 1. تبلیغات -->
                    <a href="ads-rates.html" target="_blank" class="menu-item promo-item" data-index="0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                        <span class="pixel-font-fa text-lg pt-1"> سفارش تبلیغات *</span>
                    </a>

                    <!-- 2. یوتیوب -->
                    <a href="https://www.youtube.com/@ExtraBeen" target="_blank" class="menu-item" data-index="1">
                        <div class="w-5 h-5 border-2 border-[#1f271b] flex items-center justify-center menu-border">
                            <div class="w-0 h-0 border-t-[3px] border-t-transparent border-l-[6px] border-l-[#1f271b] border-b-[3px] border-b-transparent ml-0.5"></div>
                        </div>
                        <span class="pixel-font-fa text-lg pt-1">یوتیوب</span>
                    </a>

                    <!-- 3. تلگرام -->
                    <a href="https://www.t.me/extrabeen" target="_blank" class="menu-item" data-index="2">
                        <div class="w-5 h-5 border-2 border-[#1f271b] flex items-center justify-center menu-border">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                            </svg>
                        </div>
                        <span class="pixel-font-fa text-lg pt-1">تلگرام</span>
                    </a>

                    <!-- 4. فروشگاه -->
                    <a href="https://extrabeen.com/" target="_blank" class="menu-item" data-index="3">
                        <div class="w-5 h-5 border-2 border-[#1f271b] flex items-center justify-center menu-border">
                            <div class="w-3 h-2 border border-[#1f271b] mt-0.5 border"></div>
                        </div>
                        <span class="pixel-font-fa text-lg pt-1">فروشگاه</span>
                    </a>
                    
                    <!-- 5. اسنیک (حالا قابل بازی) -->
                    <div class="menu-item" data-index="4" data-action="game">
                         <div class="w-5 h-5 border-2 border-[#1f271b] flex items-center justify-center menu-border">
                             <div class="w-2 h-2 bg-[#1f271b]"></div>
                         </div>
                         <div class="flex justify-between w-full items-center">
                             <span class="pixel-font-fa text-lg pt-1">بازی مار</span>
                             <span class="text-xs font-mono" id="high-score">00</span>
                         </div>
                    </div>

                </div>
            </div>

            <!-- صفحه بازی -->
            <div id="game-screen">
                <canvas id="snakeCanvas" width="200" height="200"></canvas>
                <div id="game-message" class="game-overlay-text">GAME OVER</div>
                <div class="mt-2 text-xs font-bold opacity-70">Use Left/Right to Turn</div>
            </div>

            <!-- اسکرول بار فیک -->
            <div class="nokia-scrollbar" id="scrollbar-container">
                <div class="nokia-scroll-thumb" id="scroll-indicator"></div>
            </div>

            <!-- سافت‌کی‌ها -->
            <div class="flex justify-between items-center pt-2 mt-auto border-t-2 border-[#1f271b] relative z-30">
                <div class="font-bold text-sm" id="left-softkey">Down</div>
                <div class="font-bold text-sm" id="right-softkey">Up</div>
            </div>
            
        </div>
        
        <!-- دکمه‌های فیزیکی -->
        <div class="mt-4 px-4">
             <div class="flex justify-between px-2 mb-3">
                 <!-- دکمه سمت چپ (پایین / چرخش چپ) -->
                 <div id="btn-down" class="phy-btn w-10 h-6 bg-[#2a3b4e] rounded-lg border-2 border-[#3d5166] shadow-[0_2px_0_#141e29] flex items-center justify-center active:shadow-none active:translate-y-[2px]" title="پایین / چپ">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#879d71]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                 </div>
                 
                 <!-- دکمه ناوی (انتخاب / شروع / توقف) -->
                 <div id="btn-select" class="phy-btn w-12 h-8 bg-[#2a3b4e] rounded-xl border-2 border-[#3d5166] shadow-[0_2px_0_#141e29] flex items-center justify-center active:shadow-none active:translate-y-[2px]" title="انتخاب">
                    <div class="w-8 h-4 border-2 border-[#879d71] rounded-full pointer-events-none"></div>
                 </div>
                 
                 <!-- دکمه سمت راست (بالا / چرخش راست) -->
                 <div id="btn-up" class="phy-btn w-10 h-6 bg-[#2a3b4e] rounded-lg border-2 border-[#3d5166] shadow-[0_2px_0_#141e29] flex items-center justify-center active:shadow-none active:translate-y-[2px]" title="بالا / راست">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#879d71]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
                    </svg>
                 </div>
             </div>
             
             <!-- کیپد -->
             <div class="grid grid-cols-3 gap-2 px-1 opacity-80 pointer-events-none">
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
                 <div class="h-6 bg-[#2a3b4e] rounded-md"></div>
             </div>
        </div>
        
    </div>

    <script>
        // --- متغیرهای کلی ---
        const menuItems = document.querySelectorAll('.menu-item');
        const scrollThumb = document.getElementById('scroll-indicator');
        const menuContainer = document.getElementById('menu-container');
        const gameScreen = document.getElementById('game-screen');
        const scrollbarContainer = document.getElementById('scrollbar-container');
        const leftSoftkey = document.getElementById('left-softkey');
        const rightSoftkey = document.getElementById('right-softkey');
        const gameMessage = document.getElementById('game-message');
        const highScoreEl = document.getElementById('high-score');
        
        let selectedIndex = 0;
        let isGameRunning = false;

        // دکمه‌های فیزیکی
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnSelect = document.getElementById('btn-select');

        // --- تنظیمات بازی مار ---
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 10; // اندازه هر خانه
        const tileCount = 20; // تعداد خانه‌ها در هر ردیف (200 / 10)
        
        let velocityX = 1; // شروع حرکت به راست
        let velocityY = 0;
        let snake = [];
        let food = { x: 15, y: 15 };
        let tailLength = 5;
        let score = 0;
        let gameInterval;
        let gameSpeed = 100; // میلی ثانیه

        // --- سیستم صوتی ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'eat') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- منطق منو ---
        function updateSelection() {
            menuItems.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
            const progress = (selectedIndex / (menuItems.length - 1)) * 100;
            const safeProgress = Math.min(Math.max(progress, 0), 70); 
            scrollThumb.style.top = `${safeProgress}%`;
        }

        function moveMenuUp() {
            if (selectedIndex > 0) {
                selectedIndex--;
                updateSelection();
                playSound('click');
            }
        }

        function moveMenuDown() {
            if (selectedIndex < menuItems.length - 1) {
                selectedIndex++;
                updateSelection();
                playSound('click');
            }
        }

        // --- منطق بازی اسنیک ---
        function resetGame() {
            snake = [{x: 10, y: 10}];
            tailLength = 5;
            score = 0;
            velocityX = 1;
            velocityY = 0;
            placeFood();
            gameMessage.style.display = 'none';
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function gameLoop() {
            // حرکت
            let headX = snake[0].x + velocityX;
            let headY = snake[0].y + velocityY;

            // برخورد با دیوارها (نسخه کلاسیک ساده: برخورد = باخت)
            if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) {
                gameOver();
                return;
            }

            // برخورد با خود
            for (let i = 0; i < snake.length; i++) {
                if (headX === snake[i].x && headY === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // حرکت سر
            snake.unshift({x: headX, y: headY});

            // خوردن غذا
            if (headX === food.x && headY === food.y) {
                score++;
                tailLength++;
                highScoreEl.innerText = String(score).padStart(2, '0');
                playSound('eat');
                placeFood();
            }

            // بریدن دم
            while (snake.length > tailLength) {
                snake.pop();
            }

            drawGame();
        }

        function drawGame() {
            // پاک کردن بوم
            ctx.fillStyle = '#99b19c'; // رنگ پس‌زمینه اسکرین
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // کشیدن غذا
            ctx.fillStyle = '#1f271b';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4); // دایره‌مانند

            // کشیدن مار
            ctx.fillStyle = '#1f271b';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            }
        }

        function gameOver() {
            clearInterval(gameInterval);
            playSound('die');
            gameMessage.style.display = 'block';
            setTimeout(() => {
                stopGame();
            }, 2000);
        }

        function startGame() {
            isGameRunning = true;
            menuContainer.style.display = 'none';
            scrollbarContainer.style.display = 'none';
            gameScreen.style.display = 'flex';
            
            // تغییر راهنمای دکمه‌ها
            leftSoftkey.innerText = "Left";
            rightSoftkey.innerText = "Right";
            
            resetGame();
            drawGame();
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function stopGame() {
            isGameRunning = false;
            clearInterval(gameInterval);
            menuContainer.style.display = 'flex';
            scrollbarContainer.style.display = 'block';
            gameScreen.style.display = 'none';
            
            // برگرداندن راهنمای دکمه‌ها
            leftSoftkey.innerText = "Down";
            rightSoftkey.innerText = "Up";
        }

        // کنترل جهت مار (با دو دکمه چرخش)
        function turnSnake(direction) {
            // direction: 'left' or 'right' (relative to snake)
            
            // اگر مار افقی حرکت می‌کند
            if (velocityX !== 0) {
                if (direction === 'left') { // اگر راست میره، چپش میشه بالا. اگر چپ میره، چپش میشه پایین
                    velocityY = (velocityX === 1) ? -1 : 1; 
                } else { // turn right
                    velocityY = (velocityX === 1) ? 1 : -1;
                }
                velocityX = 0;
            } 
            // اگر مار عمودی حرکت می‌کند
            else if (velocityY !== 0) {
                if (direction === 'left') { // اگر پایین میره، چپش میشه راست. اگر بالا میره، چپش میشه چپ
                    velocityX = (velocityY === 1) ? 1 : -1;
                } else { // turn right
                    velocityX = (velocityY === 1) ? -1 : 1;
                }
                velocityY = 0;
            }
        }


        // --- هندلر ورودی‌ها ---
        function handleUpButton() {
            if (isGameRunning) {
                turnSnake('right'); // دکمه بالا/راست = چرخش به راست
            } else {
                moveMenuUp();
            }
        }

        function handleDownButton() {
            if (isGameRunning) {
                turnSnake('left'); // دکمه پایین/چپ = چرخش به چپ
            } else {
                moveMenuDown();
            }
        }

        function handleSelectButton() {
            playSound('click');
            
            if (isGameRunning) {
                stopGame();
                return;
            }

            const currentItem = menuItems[selectedIndex];
            
            // اگر آیتم بازی بود
            if (currentItem.dataset.action === 'game') {
                startGame();
                return;
            }

            // اگر لینک معمولی بود
            const link = currentItem.getAttribute('href');
            if (link) {
                currentItem.style.backgroundColor = '#1f271b';
                currentItem.style.color = '#99b19c';
                setTimeout(() => {
                    window.open(link, '_blank');
                    currentItem.style.backgroundColor = '';
                    currentItem.style.color = '';
                }, 200);
            }
        }

        // اتصال دکمه‌ها
        btnUp.addEventListener('click', (e) => { e.preventDefault(); handleUpButton(); });
        btnDown.addEventListener('click', (e) => { e.preventDefault(); handleDownButton(); });
        btnSelect.addEventListener('click', (e) => { e.preventDefault(); handleSelectButton(); });

        // کیبورد
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') handleUpButton();
            if (e.key === 'ArrowDown') handleDownButton();
            if (e.key === 'Enter') handleSelectButton();
        });

        // --- سایر ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const networks = ['Irancell 2G', 'Rightel 2G', 'MCI 2G'];
        document.getElementById('network-name').innerText = networks[Math.floor(Math.random() * networks.length)];

        updateSelection();

    </script>
    <script>
        // Minimal haptic feedback for buttons and links
        document.addEventListener('pointerdown', (e) => {
            const clickable = e.target.closest('a, button, .menu-item, .nav-btn');
            if (clickable && navigator.vibrate) {
                navigator.vibrate(15); // Minimal haptic
            }
        });
    </script>
</body>
</html>
